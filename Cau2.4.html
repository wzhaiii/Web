<!DOCTYPE html>
<html>
    <head>
        <meta charset = utf-8>
        <script src = "jquery-4.0.0.js"></script>
        <style type = text/css>
            table {
                border: 1px solid black;
                border-collapse: collapse;
            }
            td {
                border: 1px solid black;
            }
        </style>
    </head>
    <body>
        <script>
                function inve (){
                    var ngay = document.getElementById("nc").value;
                    var ph = document.getElementById("ph");
                    var phim = ph.options[ph.selectedIndex].text;
                    var suatchieu = document.getElementById("suatchieu");
                    var suat = suatchieu.options[suatchieu.selectedIndex].text;
                    var phongchieu = document.getElementById("phongchieu");
                    var phong = phongchieu.options[phongchieu.selectedIndex].text;
                    var cho = document.getElementById("cho"); 
                    var tong = 0;
                    var html = `
                        <html>
                        <head>
                            <style>
                                h3 {
                                    text-align: center;
                                }
                                .box {
                                    border: 1px solid black;
                                    width: 300px;
                                }
                                td, th {
                                    text-align: center
                                }
                                .tb {
                                text-align: left
                                }
                            </style>
                        </head>
                        <body>
                            <div class = 'box'>
                                <h3>Thông tin vé</h3>
                            <table>
                                <tr>
                                    <td width = 100 class = tb>Khách hàng</td>
                                    <td  class = tb>Nguyễn Văn A</td>
                                </tr>
                                <tr>
                                    <td width = 100 class = tb>Ngày chiếu</td>
                                    <td  class = tb>${ngay}</td>
                                </tr>
                                <tr>
                                    <td width = 100 class = tb>Phim</td>
                                    <td  class = tb>${phim}</td>
                                </tr>
                                <tr>
                                    <td width = 100 class = tb>Suất chiếu</td>
                                    <td class = tb>${suat}</td>
                                </tr>
                                <tr>
                                    <td width = 100 class = tb>Phòng chiếu</td>
                                    <td  class = tb>${phong}</td>
                                </tr>
                            </table>
                            <table>
                                <tr>
                                    <th>Ghế</th>
                                    <th>Giá vé</th>
                                </tr>`;
                    for ( var i = 0; i < cho.options.length; i++ ){
                        if ( cho.options[i].selected ){
                            var gia = Number(suatchieu.value) * Number(phongchieu.value);
                            tong += gia;
                            html += `
                                <tr>
                                    <td>${cho.options[i].text}</td>
                                    <td>${gia.toLocaleString()}</td>
                                </tr>`
                        }}
                        html += `
                            <br>
                            <tr>
                                <td><b>Tổng tiền</b></td>
                                <td><b>${tong.toLocaleString()} đ</b></td>
                            </tr>
                            </table>
                            </div>
                        </body>
                        </html>`;
                    var win = window.open('');
                    win.document.write(html);
                    win.document.close();
                }
        </script>
        <table width = 400 height = 400>
            <tr>
                <td align = center colspan = 2><b>Mua vé</b></td>
            </tr>
            <tr>
                <td>Ngày chiếu</td>
                <td><input id = 'nc' type = text value = dd/mm/yyyy></td>
            </tr>
            <tr>
                <td>Phim</td>
                <td><select size = 1 id = "ph">
                        <option selected>Phim</option>
                        <option>Yêu em bất chấp</option>
                        <option>Tháng năm rực rỡ</option>
                        <option>Và em sẽ đến</option>
                        <option>Chuyện ma lúc 3 giờ sáng</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Suất chiếu</td>
                <td><select size = 1 id = 'suatchieu'>
                        <option selected>Suất chiếu</option>
                        <option value = '45000'>9h - 12h</option>
                        <option value = '45000'>13h - 16h</option>
                        <option value = '55000'>17h - 20h</option>
                        <option value = '35000'>22h - 2h</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Phòng chiếu</td>
                <td><select size = 1 id = 'phongchieu'>
                        <option selected>Phòng chiếu</option>
                        <option value = '1.0'>Đồng</option>
                        <option value = '1.2'>Bạc</option>
                        <option value = '1.5'>Vàng</option>
                        <option value = '2.0'>Kim cương</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td height = 50>Chọn chỗ ngồi</td>
                <td><select size = 1 multiple id = "cho">
                        <option selected>Ghế 01</option>
                        <option>Ghế 02</option>
                        <option>Ghế 03</option>
                        <option>Ghế 04</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan = 2 align = center><input type = button value = 'Mua vé' onclick = 'inve()'></td>
            </tr>
        </table>
    </body>
</html>
