<!DOCTYPE html>
<html>
    <head>
        <meta charset = utf-8>
        <style type = text/css>
            .menu {
                list-style: none;
                background: darkblue;
                display: flex;
                justify-content: center;
            }
            .menu li{
                position: relative;
            }
            .submenu{
                display: none;
                position: absolute;
                background: darkblue;
                list-style: none;
                top: 100%;
                left: 70%;
                transform: translateX(-50%);           
                padding: 0;
                margin: 0
            }
            .submenu li a{
                display: block;
                width: 100px
            }
            .menu li a{
                color: yellow;
                padding: 15px 25px;
                display: block;
                text-decoration: none;
            }
            .dropdown:hover .submenu{
                display: block;
        
            }
            .submenu li a:hover  {
                background: lightblue;
                color: #ADFF2F
            }
        </style>
    </head>
    <body>
        <ul class = menu>
            <li><a href = #>Trang chủ</a></li>
            <li class = dropdown>
                <a href = #>Du lịch</a>
                <ul class = submenu>
                    <li><a href = #>Trong nước</a></li>
                    <li><a href = #>Quốc tế</a></li>
                    <li><a href = #>Tự chọn</a></li>
                </ul>
            </li>
            <li><a href = #>Tin tức</a></li>
            <li><a href = #>Khuyến mãi</a></li>
            <li><a href = #>Liên hệ</a></li>
        </ul>
    </body>
</html>
