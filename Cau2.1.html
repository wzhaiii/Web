<!DOCTYPE html>
<html>
    <head>
        <meta charset = utf-8>
        <style type = text/css>
            table,td {
                border: 3px solid blue;
                border-collapse: collapse;
            }
            input[type = button] {
                border-radius: 100px
            }
            div {
                border: 3px solid blue;
                width: 503px;
                padding: 2px;
                padding-right: 0px
            }
        </style>
    </head>
    <body>
        <script>
            function Tinhluong(){
                var luong = Number(document.getElementById("nhapluong").value);
                var hsl = document.getElementById("heso").value;
                document.getElementById("result").innerHTML = luong * hsl;
            }
        </script>
        <div>
            <table  bgcolor = orange width = 500px>
                <tr>
                    <td width = 100px >Lương</td>
                    <td><input type = text id = nhapluong size = 20></td>
                </tr>
                <tr>
                    <td width = 100px>Hệ số lương</td>
                    <td><input type = number id = heso style = width:70px value = 3.2 step = 0.1></td>
                </tr>
                <tr>
                    <td colspan = 2 align = center><input type = button value = "Tính lương tháng" onclick = Tinhluong()></td>
                </tr>
                <tr>
                    <td width = 100px>Lương tháng</td>
                    <td id = result></td>
                </tr>
            </table>
        </div>
    </body>
</html>
