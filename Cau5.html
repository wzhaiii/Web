<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <style type = "text/css">
            .fr {
                display: grid;
                grid-template-columns: 120px 1fr;
                gap: 50px;
                margin-left: 580px;
                width:30px
            }
            input[type="button"] {
                height: 25px;
                margin-left: 750px;
                border-radius: 100px;
                margin-top: 1px
                }
            input[type = "text"]{
                margin-bottom: 5px;
            }
            hr {
                height: 2px
            }
            p {
                color: blue
            }
            i {
                margin-left: 700px 
            }
        </style>
    </head>
    <body>
        <p align = "center">Đăng nhập hệ thống</p>
        <hr color = "#0000FF">
        <div class = "fr">
            <label>Tên đăng nhập</label>
            <input type = "text" placeholder = "nhập tên">
        </div>
        <div class = "fr">
            <label>Mật khẩu</label>
            <input type = "text" placeholder = "nhập mã số">
        </div>
            <input type = "button" value = "Đăng nhập">
            <br>
            <i>Quên mật khẩu / Đăng ký</i>
        <hr color = "#0000FF">
    </body>
</html>
