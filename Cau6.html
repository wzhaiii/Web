<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <style type = "text/css">
            .tb {
                display: flex;
                justify-content: center;
                align-items: center
            }
            .c1 {
                width: 150px;
                color: blue
            }
            table {
                border-collapse: collapse;
            }
            table, td,th {
                border: 2px solid black
            }
            #dcm {
                width: 300px
            }
            .cmm {
                width: 200px
            }
        </style>
    </head>
    <body bgcolor = "#FFEDCA">
        <h1 align = "center">Phiếu đăng ký tham gia dự thưởng</h1>
        <br>
        <div class = "tb">
        <table width = "450">
            <tr>
                <td class = "c1">Họ và tên</td>
                <td><input type = "text" class = "cmm" placeholder = "Nguyễn Văn A"></td>
            </tr>
            <tr>
                <td class = "c1" >Địa chỉ</td>
                <td><input type = "text" id = "dcm" placeholder = "abc,xyz,jqk"></td>
            </tr>
            <tr>
                <td class = "c1">Điện thoại</td>
                <td><input type = "text" class = "cmm" placeholder = "09xxxxxxxx"></td>
            </tr>
            <tr>
                <td class = "c1">Phái</td>
                <td><input type = "radio" checked> Nam <input type = "radio"> Nữ</td>
            </tr>
            <tr>
                <td class = "c1">Sản phẩm</td>
                <td><select size="4" class = "cmm">
                    <option selected>Iphone 11 Pro Max</option>
                    <option>Samsung Glaxy Note 20</option>
                    <option>Xiaomi Redmi K30</option>
                    <option>OPPO A53</option>
                    <option>Xiaomi Redmi</option></select>
                </td>
            </tr>
            <tr>
                <td class = "c1">Số dự đoán</td>
                <td><input type = "number" value = "5" class = "cmm"></td>
            </tr>
            <tr>
                <td colspan = "2" align = "center"><input type = "button" value = "Đăng ký"></td>
            </tr>
        </table></div>
    </body>
</html>
